<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="日文任務" />
    <title>日文任務 N5-N1</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div><p class="eyebrow">JLPT SPEAKING QUIZ</p><h1>日文任務</h1></div>
        <button class="icon-button" id="homeButton" type="button" aria-label="回首頁" title="回首頁"><span aria-hidden="true">家</span></button>
      </header>
      <nav class="mode-tabs" aria-label="功能">
        <button class="active" type="button" data-mode="quiz">測驗</button>
        <button type="button" data-mode="particles">助詞</button>
        <button type="button" data-mode="lyrics">歌詞假名</button>
      </nav>
      <section class="stats-strip" aria-label="練習統計">
        <div><span id="todayCount">0</span><small>今日題數</small></div>
        <div><span id="accuracy">--</span><small>答對率</small></div>
        <div><span id="weakCount">0</span><small>弱點</small></div>
      </section>
      <section class="setup-panel" id="setupPanel">
        <div class="section-heading"><h2>選程度</h2></div>
        <div class="segmented" id="levelTabs" role="tablist" aria-label="JLPT 等級">
          <button class="active" type="button" data-level="N5">N5</button><button type="button" data-level="N4">N4</button><button type="button" data-level="N3">N3</button><button type="button" data-level="N2">N2</button><button type="button" data-level="N1">N1</button>
        </div>
        <div class="section-heading scene-heading"><h2>選場景</h2></div>
        <select class="scene-select" id="sceneSelect" aria-label="生活場景">
          <option value="airport">機場：入境、行李、轉機</option><option value="hotel">飯店：入住、需求、客訴</option><option value="cafe">咖啡廳：點餐、外帶、客製</option><option value="yakiniku">燒肉餐廳：訂位、點餐、烤法</option><option value="laundry">洗衣店：投幣、烘乾、取件</option><option value="stationery">文具店：找商品、筆記本、包裝</option><option value="school">學校：上課、作業、請假</option><option value="office">公司：會議、進度、請求協助</option><option value="hospital">醫院：症狀、掛號、藥</option><option value="pharmacy">藥妝店：找藥、成分、免稅</option><option value="train">電車：換乘、延誤、月台</option><option value="supermarket">超市：結帳、袋子、熟食</option><option value="postoffice">郵局：寄包裹、地址、運費</option><option value="hairSalon">髮廊：預約、長度、造型</option><option value="bank">銀行：提款、換錢、手續費</option><option value="gym">健身房：入會、器材、課程</option><option value="apartment">租屋：看房、押金、設備</option><option value="cityHall">市役所：證明、登記、窗口</option>
        </select>
        <button class="primary full" id="startQuiz" type="button">開始測驗</button>
      </section>
      <section class="quiz-panel hidden" id="quizPanel" aria-live="polite">
        <div class="mission-header"><div><p class="eyebrow" id="quizMeta">N5 · 機場</p><h2 id="quizTitle">聽音選意思</h2></div><span id="stepBadge">1 / 3</span></div>
        <div class="pronunciation-card"><p class="prompt-label" id="questionPrompt">先聽日文，再選正確中文。</p><h2 id="questionText">すみません。</h2><p class="meaning hidden" id="answerReveal"></p></div>
        <div class="sound-controls"><button class="secondary" id="playNormal" type="button">播放</button><button class="secondary" id="playSlow" type="button">慢速</button><button class="primary" id="speakTry" type="button">跟讀</button></div>
        <div class="answers" id="answers"></div><p class="feedback" id="feedback">按「播放」聽題目。</p><p class="speech-result" id="speechResult"></p>
        <div class="actions"><button class="secondary" id="markHard" type="button">加入弱點</button><button class="primary" id="nextQuestion" type="button">下一題</button></div>
      </section>
      <section class="lyrics-panel hidden" id="lyricsPanel">
        <div class="section-heading"><h2>歌名找歌詞</h2></div>
        <label class="field-label" for="songTitleInput">歌名或歌手</label><input id="songTitleInput" class="text-input" type="search" placeholder="例：Lemon 米津玄師" />
        <div class="actions"><button class="secondary" id="clearSong" type="button">清空</button><button class="primary" id="searchLyrics" type="button">搜尋授權歌詞</button></div>
        <p class="lyrics-note">現代歌曲多數有版權。這裡會幫你找授權歌詞頁或官方來源；若之後接上合法歌詞 API，就能自動把歌詞轉成假名練習。</p>
        <div class="search-links hidden" id="searchLinks"></div>
        <label class="field-label" for="lyricsInput">授權歌詞文字</label><textarea id="lyricsInput" rows="6" placeholder="若你有合法來源的歌詞文字，可以貼在這裡轉假名。"></textarea>
        <button class="primary full" id="convertLyrics" type="button">轉成假名練習</button><div class="lyrics-output" id="lyricsOutput"><p>搜尋結果或轉換後的假名會顯示在這裡。</p></div>
      </section>
      <section class="mistakes"><div class="section-heading"><h2>弱點本</h2><button id="clearWeak" type="button">清空</button></div><ul id="weakList"></ul></section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17150f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="言葉小旅行" />
    <title>言葉小旅行</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Kotoba Trip</p>
          <h1>言葉小旅行</h1>
          <p class="lead">用一段小劇情學日文。先懂場景，再練語感，最後開口跟讀。</p>
        </div>
        <button id="soundToggle" class="icon-button" type="button" aria-label="切換發音">音</button>
      </header>

      <section id="homeView" class="view">
        <section class="today-card">
          <div class="postmark">TODAY</div>
          <h2 id="todayTitle">今日小旅行</h2>
          <p id="todayCopy">載入中</p>
          <div class="route-strip" aria-hidden="true">
            <span></span><i></i><span></span><i></i><span></span>
          </div>
          <button id="startToday" class="primary wide" type="button">開始 5 分鐘</button>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>選一個地方</h2>
            <span id="freshCount">0 個新練習</span>
          </div>
          <div id="sceneList" class="scene-list"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>今日記憶</h2>
            <span>不是背答案，是換句子還會</span>
          </div>
          <div id="memoryBoard" class="memory-board"></div>
        </section>
      </section>

      <section id="practiceView" class="view hidden">
        <header class="practice-top">
          <button id="leavePractice" class="text-button" type="button">返回</button>
          <div>
            <p id="practiceScene" class="eyebrow">Scene</p>
            <h2 id="practiceTitle">練習</h2>
          </div>
          <span id="practiceProgress">1/5</span>
        </header>

        <section class="prompt-card">
          <p id="promptMode" class="prompt-mode">語感</p>
          <h2 id="promptText"></h2>
          <p id="promptHint"></p>
          <button id="playPrompt" class="sound-button" type="button">聽這句</button>
        </section>

        <section id="choiceArea" class="choice-area"></section>
        <section id="feedback" class="feedback hidden"></section>

        <div class="practice-actions">
          <button id="notSure" class="secondary" type="button">我不確定</button>
          <button id="nextCard" class="primary" type="button">下一張</button>
        </div>
      </section>

      <section id="notebookView" class="view hidden">
        <section class="section">
          <div class="section-head">
            <h2>錯題本</h2>
            <button id="reviewWeakness" class="small-button" type="button">換句複習</button>
          </div>
          <div id="weaknessList" class="note-list"></div>
        </section>
      </section>

      <section id="meView" class="view hidden">
        <section class="profile-card">
          <p class="eyebrow">My Trip</p>
          <h2 id="streakText">0 天</h2>
          <p id="profileSummary">今天還沒開始。</p>
        </section>
        <section class="section">
          <div class="section-head"><h2>學習足跡</h2></div>
          <div id="statsList" class="note-list"></div>
        </section>
      </section>

      <nav class="bottom-nav" aria-label="主要頁面">
        <button class="active" data-view="home" type="button">旅行</button>
        <button data-view="practice" type="button">練習</button>
        <button data-view="notebook" type="button">錯題</button>
        <button data-view="me" type="button">我的</button>
      </nav>
    </main>
    <script src="./app.js"></script>
  </body>
</html>

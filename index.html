<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17150f"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="言葉小旅行"><title>言葉小旅行</title><link rel="stylesheet" href="./styles.css"></head><body><main class="shell"><header class="masthead"><div><p class="eyebrow">Kotoba Trip V5</p><h1>言葉小旅行</h1><p class="lead">用小劇情學日文。場景練語感，單詞用分類卡片慢慢累積。</p></div><button id="soundToggle" class="icon" type="button">音</button></header><section id="homeView" class="view"><section class="hero"><p>TODAY</p><h2 id="todayTitle">載入中</h2><span id="todayCopy"></span><button id="startToday" class="primary">開始 8 題</button></section><div class="head"><h2>小旅行題庫</h2><span id="freshCount"></span></div><div id="sceneList" class="list"></div><div class="head"><h2>今日記憶</h2><span>換句也要會</span></div><div id="memoryBoard" class="grid"></div></section><section id="vocabView" class="view hidden"><div class="head"><h2>單詞卡</h2><span id="vocabCount"></span></div><div class="tools"><select id="vocabCategory"></select><button id="startVocab" class="primary">開始單詞練習</button></div><div id="vocabShelf" class="words"></div></section><section id="practiceView" class="view hidden"><header class="top"><button id="leavePractice" class="ghost">返回</button><div><p id="practiceScene" class="eyebrow"></p><h2 id="practiceTitle">練習</h2></div><b id="practiceProgress"></b></header><section class="prompt"><p id="promptMode"></p><h2 id="promptText"></h2><span id="promptHint"></span><button id="playPrompt" class="pill">聽這句</button></section><section id="choiceArea" class="choices"></section><section id="feedback" class="feedback hidden"></section><div class="actions"><button id="notSure" class="secondary">我不確定</button><button id="nextCard" class="primary">下一張</button></div></section><section id="notebookView" class="view hidden"><div class="head"><h2>

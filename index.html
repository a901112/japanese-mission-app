<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e6f62" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="日文任務" />
    <title>Japanese Mission App</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Japanese Sense Trainer</p>
          <h1>日文練習 V5</h1>
          <p class="topline">先選等級，再選文法或單詞。</p>
        </div>
      </header>

      <section id="homeView" class="view">

        <section class="level-panel">
          <div class="section-row">
            <h2 class="section-label">選擇等級</h2>
            <span id="levelSummary">載入中</span>
          </div>
          <div id="levelGrid" class="level-grid" aria-label="選擇日文程度"></div>
        </section>

        <section class="mode-panel">
          <section class="content-switch" aria-label="學習內容類型">
            <button class="content-card active" data-home-type="grammar" type="button">
              <strong>文法</strong>
              <small id="grammarSummary">載入中</small>
            </button>
            <button class="content-card" data-home-type="vocabulary" type="button">
              <strong>單詞</strong>
              <small id="vocabularySummary">載入中</small>
            </button>
          </section>
        </section>

        <section id="grammarHomePanel">
          <section class="filter-panel compact-filter">
            <label><span>場景</span>
              <select id="sceneFilter">
                <option value="all">全部</option>
                <option value="daily">日常</option>
                <option value="travel">旅行</option>
                <option value="school">學校</option>
                <option value="work">公司</option>
              </select>
            </label>
          </section>

          <section class="section-block">
            <h2 class="section-label">練習方式</h2>
            <section class="module-grid" aria-label="文法練習模組">
              <button class="module-card" data-start="grammar_arrangement" type="button">
                <strong>語法排列</strong>
                <span>同樣單字，改變助詞和排列，意思就改變。</span>
              </button>
              <button class="module-card" data-start="verb_sense" type="button">
                <strong>動詞語感</strong>
                <span>見る、見える、見せる 差在哪裡。</span>
              </button>
              <button class="module-card" data-start="weak_review" type="button">
                <strong>弱點複習</strong>
                <span>針對常錯概念重新出變體題。</span>
              </button>
              <button class="module-card" data-start="audio_sense" type="button">
                <strong>聽覺語感</strong>
                <span>聽句子、聽最小差異，答後跟讀。</span>
              </button>
            </section>
          </section>

          <section class="section-block">
            <h2 class="section-label">任務</h2>
            <p class="section-desc">同一個弱點下次會換題，不會一直重複同一句。</p>
            <div id="missionGrid" class="mission-grid"></div>
          </section>
        </section>

        <section id="vocabularyHomePanel" class="hidden">
          <section class="section-block">
            <h2 class="section-label">分類</h2>
            <p class="section-desc">先選主題，再看這組單字的讀音、意思和例句。</p>
            <div id="vocabularyGrid" class="vocabulary-grid"></div>
          </section>
          <section class="section-block">
            <h2 class="section-label">單詞清單</h2>
            <div id="vocabularyList" class="vocabulary-list"></div>
          </section>
        </section>

        <!-- 題庫狀態 -->
        <section class="status-panel">
          <h2>題庫狀態</h2>
          <p id="bankStatus">題庫載入中。</p>
          <p id="policyStatus">Audio Policy 載入中。</p>
        </section>

      </section>

      <!-- 練習頁 -->
      <section id="practiceView" class="view hidden">
        <section class="practice-head">
          <button class="ghost" id="backHome" type="button">返回</button>
          <div>
            <p class="eyebrow" id="questionMeta">語感訓練</p>
            <h2 id="questionType">語法排列</h2>
          </div>
          <span id="questionProgress">1 / 10</span>
        </section>
        <section class="question-card">
          <p id="questionInstruction">請作答。</p>
          <h2 id="questionText"></h2>
          <div id="tokenArea" class="token-area"></div>
          <div id="buildArea" class="build-area hidden"></div>
          <div class="audio-row">
            <button id="playBefore" type="button">題目前音</button>
            <button id="playAnswer" type="button" disabled>正解</button>
            <button id="playSlow" type="button" disabled>慢速</button>
          </div>
        </section>
        <section id="answerArea" class="answer-area"></section>
        <section id="feedbackPanel" class="feedback-panel hidden"></section>
        <section class="action-row">
          <button class="secondary" id="unknownButton" type="button">我不懂</button>
          <button class="primary" id="nextButton" type="button">下一題</button>
        </section>
      </section>

      <nav class="tabs" aria-label="主要頁面">
        <button class="active" data-view="home" type="button">首頁</button>
        <button data-view="weakness" type="button">錯題本</button>
        <button data-view="stats" type="button">我的</button>
        <button data-view="debug" type="button">Debug</button>
      </nav>

      <!-- 弱點頁 -->
      <section id="weaknessView" class="view hidden">
        <section class="section-head">
          <h2>弱點本</h2>
          <button id="reviewWeakButton" type="button">練 10 題</button>
        </section>
        <div id="weaknessList" class="list-panel"></div>
      </section>

      <!-- 統計頁 -->
      <section id="statsView" class="view hidden">
        <section class="section-head"><h2>統計</h2></section>
        <div id="statsDetail" class="list-panel"></div>
      </section>

      <!-- Debug 頁 -->
      <section id="debugView" class="view hidden">
        <section class="section-head"><h2>題庫管理 / Debug</h2></section>
        <div id="debugReport" class="list-panel"></div>
      </section>

    </main>
    <script src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="日文任務" />
    <title>日文任務 V9</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">JLPT MISSION V9</p>
          <h1>日文任務</h1>
        </div>
        <button class="icon-button" id="homeButton" type="button" aria-label="首頁">家</button>
      </header>

      <nav class="tabs" aria-label="主要頁面">
        <button class="active" data-view="dashboard" type="button">首頁</button>
        <button data-view="weakness" type="button">弱點</button>
        <button data-view="stats" type="button">統計</button>
        <button data-view="admin" type="button">檢查</button>
      </nav>

      <section id="dashboardView" class="view">
        <section class="hero-panel">
          <div>
            <p class="eyebrow">今日任務</p>
            <h2 id="missionTitle">N5 · 機場 · 混合模式</h2>
            <p id="missionSummary">先把機場 N5 的核心句型練穩，再擴張到其他場景。</p>
          </div>
          <button class="primary" id="startPractice" type="button">開始練習</button>
        </section>

        <section class="stats-grid" aria-label="學習狀態">
          <div><strong id="todayDone">0</strong><span>今日題數</span></div>
          <div><strong id="todayRate">--</strong><span>今日答對</span></div>
          <div><strong id="totalDone">0</strong><span>累積題數</span></div>
          <div><strong id="weakCount">0</strong><span>弱點題</span></div>
        </section>

        <section class="settings-panel">
          <label>
            <span>JLPT 等級</span>
            <select id="levelSelect">
              <option value="N5">N5</option>
              <option value="N4" disabled>N4（待開放）</option>
              <option value="N3" disabled>N3（待開放）</option>
              <option value="N2" disabled>N2（待開放）</option>
              <option value="N1" disabled>N1（待開放）</option>
            </select>
          </label>
          <label>
            <span>場景</span>
            <select id="sceneSelect">
              <option value="airport">機場</option>
            </select>
          </label>
          <label>
            <span>測驗模式</span>
            <select id="modeSelect">
              <option value="mixed">混合模式</option>
              <option value="new">新題模式</option>
              <option value="weak">弱點複習</option>
            </select>
          </label>
        </section>

        <section class="status-panel">
          <h2>學習狀態</h2>
          <p id="topWeakGrammar">最常錯文法：--</p>
          <p id="topWeakType">最常錯類型：--</p>
          <p id="bankStatus">題庫載入中。</p>
        </section>
      </section>

      <section id="practiceView" class="view hidden">
        <section class="practice-head">
          <div>
            <p class="eyebrow" id="questionMeta">N5 · 機場</p>
            <h2 id="questionType">日文選中文</h2>
          </div>
          <span id="questionProgress">1 / 30</span>
        </section>

        <section class="question-card">
          <p id="questionInstruction">選出正確答案。</p>
          <h2 id="questionText">トイレはどこですか。</h2>
          <div class="audio-row">
            <button id="playNormal" type="button">播放</button>
            <button id="playSlow" type="button">慢速</button>
            <button id="speakTry" type="button">跟讀</button>
          </div>
        </section>

        <section id="answerArea" class="answer-area"></section>

        <section id="feedbackPanel" class="feedback-panel hidden"></section>

        <section class="action-row">
          <button class="secondary" id="unknownButton" type="button">我不懂</button>
          <button class="primary" id="nextButton" type="button">下一題</button>
        </section>
      </section>

      <section id="weaknessView" class="view hidden">
        <section class="section-head">
          <h2>弱點本</h2>
          <button id="reviewWeakButton" type="button">複習弱點</button>
        </section>
        <div id="weaknessList" class="list-panel"></div>
      </section>

      <section id="statsView" class="view hidden">
        <section class="section-head"><h2>統計</h2></section>
        <div id="statsDetail" class="list-panel"></div>
      </section>

      <section id="adminView" class="view hidden">
        <section class="section-head"><h2>題庫檢查</h2></section>
        <div id="adminReport" class="list-panel"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

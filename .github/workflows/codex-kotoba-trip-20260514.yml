name: Codex Kotoba Trip rewrite

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/codex-kotoba-trip-20260514.yml

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download new site files
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import urllib.request, zipfile
          url = 'https://tmpfiles.org/dl/wuwrwQhV4eis/kotoba-trip-v1.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 Codex-GitHub-Actions'})
          with urllib.request.urlopen(req, timeout=60) as r:
              data = r.read()
          Path('/tmp/kotoba-trip-v1.zip').write_bytes(data)
          z = zipfile.ZipFile('/tmp/kotoba-trip-v1.zip')
          for info in z.infolist():
              name = info.filename.replace('\\', '/')
              if name.endswith('/'):
                  continue
              target = Path(name)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(z.read(info))
              print('extracted', target)
          PY
      - name: Validate full rewrite markers
        run: |
          set -euo pipefail
          grep -q '言葉小旅行' index.html
          grep -q 'Kotoba Trip V1' app.js
          grep -q 'kotobaTripProgress_v1' app.js
          grep -q 'pickDeck' app.js
          grep -q '完全不讀舊題庫' app.js
          ! grep -q 'published_questions' app.js
          ! grep -q 'Japanese Sense Trainer V5' app.js
          ! grep -q 'JLPT' index.html
      - name: Commit rewrite
        run: |
          set -euo pipefail
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add index.html styles.css app.js
          git commit -m "feat: rebuild as Kotoba Trip learning experience" || exit 0
          git push origin main

name: Codex clean UI update

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/codex-clean-ui-20260514.yml

permissions:
  contents: write

jobs:
  update-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download clean UI files
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import urllib.request, zipfile
          url = 'https://tmpfiles.org/dl/wgwtwVFMwxuD/jma-clean-ui.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 Codex-GitHub-Actions'})
          with urllib.request.urlopen(req, timeout=60) as r:
              data = r.read()
          Path('/tmp/jma-clean-ui.zip').write_bytes(data)
          z = zipfile.ZipFile('/tmp/jma-clean-ui.zip')
          for info in z.infolist():
              name = info.filename.replace('\\', '/')
              if name.endswith('/'):
                  continue
              target = Path(name)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(z.read(info))
              print('extracted', target)
          PY
      - name: Validate clean UI markers
        run: |
          set -euo pipefail
          grep -q '日文語感訓練 V4' index.html
          grep -q 'id="grammarSummary"' index.html
          grep -q 'id="vocabularySummary"' index.html
          grep -q 'Japanese Sense Trainer V4 Clean' app.js
          grep -q 'grid-template-columns: repeat(4, 1fr)' styles.css
      - name: Commit clean UI
        run: |
          set -euo pipefail
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add index.html styles.css app.js
          git commit -m "style: simplify home learning entry UI" || exit 0
          git push origin main

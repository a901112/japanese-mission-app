name: Import UI redesign files

on:
  push:
    paths:
      - ".github/workflows/import-ui-redesign.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-ui-redesign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download UI archive
        run: |
          curl -fsSL "https://tmpfiles.org/dl/w6wvwzfO8mWP/japanese_ui_redesign.zip" -o /tmp/japanese_ui_redesign.zip
          unzip -o /tmp/japanese_ui_redesign.zip -d . || true
      - name: Validate files
        run: |
          node <<'NODE'
          const fs = require('fs');
          for (const file of ['app.js', 'index.html', 'styles.css']) {
            if (!fs.existsSync(file)) throw new Error(`Missing ${file}`);
            const raw = fs.readFileSync(file, 'utf8');
            console.log(`${file}: ${raw.length} chars`);
          }
          const index = fs.readFileSync('index.html', 'utf8');
          const app = fs.readFileSync('app.js', 'utf8');
          if (!index.includes('data-home-type="grammar"')) throw new Error('Missing grammar entry');
          if (!index.includes('data-home-type="vocabulary"')) throw new Error('Missing vocabulary entry');
          if (!app.includes('function renderVocabulary')) throw new Error('Missing vocabulary renderer');
          NODE
      - name: Commit UI redesign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html styles.css
          git commit -m "feat: reorganize home into grammar and vocabulary sections" || exit 0
          git push origin main

name: Import published questions seed

on:
  push:
    paths:
      - ".github/workflows/import-published-questions.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download published questions seed
        run: |
          mkdir -p data/questions
          curl -fsSL "https://tmpfiles.org/dl/37580454/published_questions.json" -o data/questions/published_questions.json
      - name: Validate seed
        run: |
          node <<'NODE'
          const fs = require('fs');
          const questions = JSON.parse(fs.readFileSync('data/questions/published_questions.json', 'utf8'));
          const pass = questions.filter((q) => q.status === 'published' && q.audit_pass === true && q.validation?.audit_pass === true).length;
          const badLight = questions.filter((q) => q.target_meaning?.includes('燈亮著') && q.choices?.find((c) => c.is_correct)?.text === '電気がつく').length;
          const goodLight = questions.filter((q) => q.target_meaning?.includes('燈亮著') && q.choices?.find((c) => c.is_correct)?.text === '電気がついている').length;
          console.log({ total: questions.length, pass, badLight, goodLight });
          if (questions.length !== 100 || pass !== 100 || badLight !== 0 || goodLight < 1) process.exit(1);
          NODE
      - name: Commit seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/questions/published_questions.json
          git commit -m "Replace published questions with seed 100" || exit 0
          git push

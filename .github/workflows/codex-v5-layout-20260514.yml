name: Codex V5 layout update

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/codex-v5-layout-20260514.yml

permissions:
  contents: write

jobs:
  update-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download V5 layout files
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import urllib.request, zipfile
          url = 'https://tmpfiles.org/dl/wiwAwxhkHgiE/jma-v5-layout.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 Codex-GitHub-Actions'})
          with urllib.request.urlopen(req, timeout=60) as r:
              data = r.read()
          Path('/tmp/jma-v5-layout.zip').write_bytes(data)
          z = zipfile.ZipFile('/tmp/jma-v5-layout.zip')
          for info in z.infolist():
              name = info.filename.replace('\\', '/')
              if name.endswith('/'):
                  continue
              target = Path(name)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(z.read(info))
              print('extracted', target)
          PY
      - name: Validate V5 layout markers
        run: |
          set -euo pipefail
          grep -q '日文練習 V5' index.html
          grep -q 'id="levelGrid"' index.html
          grep -q '首頁</button>' index.html
          grep -q 'Japanese Sense Trainer V5 Level' app.js
          grep -q 'QUESTION_HISTORY_KEY' app.js
          grep -q 'selectPracticeQueue' app.js
          grep -q 'position: fixed;' styles.css
          grep -q '.level-card.active' styles.css
      - name: Commit V5 layout
        run: |
          set -euo pipefail
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add index.html styles.css app.js
          git commit -m "feat: add level-first layout and reduce repeated questions" || exit 0
          git push origin main

name: Import Phase 1 data files

on:
  push:
    paths:
      - ".github/workflows/import-phase1-data.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-phase1-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download data archive
        run: |
          curl -fsSL "https://tmpfiles.org/dl/wcwfwsfi7tfD/japanese_phase1_data.zip" -o /tmp/japanese_phase1_data.zip
          unzip -o /tmp/japanese_phase1_data.zip -d .
      - name: Validate JSON files
        run: |
          node <<'NODE'
          const fs = require('fs');
          const files = [
            'data/knowledge/knowledge_points.json',
            'data/vocabulary/vocabulary_categories.json',
            'data/vocabulary/vocabulary_items.json',
            'data/missions/missions.json',
            'data/missions/mission_paths.json',
            'data/users/local_progress_schema.json'
          ];
          for (const file of files) {
            const raw = fs.readFileSync(file, 'utf8');
            JSON.parse(raw);
            console.log(`${file}: ok (${raw.length} chars)`);
          }
          NODE
      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "feat: add Phase 1 data architecture (knowledge, vocabulary, missions, progress schema)" || exit 0
          git push origin main

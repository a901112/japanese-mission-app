          cat > styles.css <<'CSS'
          :root{--bg:#f3efe5;--paper:#fffdf7;--ink:#1f1b14;--muted:#766d5f;--line:#ded3bf;--accent:#d95f35;--green:#276b5d;--soft:#f5ead6;--good:#216a56;--bad:#9f3e32;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#f7f2e8,var(--bg));color:var(--ink)}button,select{min-height:44px;border:1px solid var(--line);border-radius:16px;background:var(--paper);color:inherit;font:inherit;font-weight:850}.hidden{display:none!important}.shell{width:min(100%,520px);min-height:100vh;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom))}.masthead{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:18px}.eyebrow{margin:0 0 6px;color:var(--accent);font-size:12px;font-weight:950;letter-spacing:.04em;text-transform:uppercase}h1,h2,p{margin-top:0}h1{margin-bottom:6px;font-size:32px;line-height:1.06}.lead{max-width:330px;margin:0;color:var(--muted);font-size:14px;font-weight:720;line-height:1.55}.icon{width:46px;height:46px;padding:0;background:#fff7e5;color:var(--accent)}.primary{border-color:var(--accent);background:var(--accent);color:#fff}.secondary{background:#fffaf0;color:var(--muted)}.ghost{border:none;background:transparent;color:var(--muted)}.pill{min-height:36px;padding:0 12px;border-radius:999px;background:var(--soft);color:var(--green)}.hero{position:relative;overflow:hidden;padding:20px;margin-bottom:18px;border:1px solid #dbc7a5;border-radius:26px;background:linear-gradient(135deg,#fff7e8,#fde3b0);box-shadow:0 14px 36px rgba(91,65,31,.1)}.hero p{width:fit-content;padding:4px 9px;border:1px solid rgba(31,27,20,.2);border-radius:999px;color:var(--green);font-size:11px;font-weight:950}.hero h2{margin-bottom:8px;font-size:25px}.hero span{display:block;margin-bottom:16px;color:#5f5140;font-weight:760;line-height:1.55}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:18px 0 10px}.head h2{margin:0;font-size:18px}.head span{color:var(--muted);font-size:12px;font-weight:820;text-align:right}.list{display:grid;gap:10px}.scene{width:100%;min-height:92px;padding:14px;display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;text-align:left}.art{width:56px;height:56px;display:grid;place-items:center;border-radius:18px;background:#d9edf0;font-size:28px}.scene small,.scene span,.word small{display:block;color:var(--muted);font-size:12px;font-weight:740;line-height:1.45}.count{min-width:54px;padding:7px 8px;border-radius:999px;background:var(--soft);color:#9a4f1d;text-align:center}.grid,.words{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chip,.note,.word{padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--paper);color:var(--muted);font-weight:740;line-height:1.55}.chip strong,.note strong,.word strong{display:block;color:var(--ink)}.tools{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:12px}.word{min-height:116px;text-align:left}.word b{display:inline-block;padding:3px 7px;margin-bottom:10px;border-radius:999px;background:var(--soft);color:var(--green);font-size:11px}.word strong{font-size:22px}.top{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin-bottom:14px}.top h2{margin:0;font-size:20px}.prompt{padding:18px;margin-bottom:12px;border:1px solid var(--line);border-radius:24px;background:var(--paper)}.prompt p{width:fit-content;padding:4px 9px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:12px;font-weight:950}.prompt h2{font-size:25px;line-height:1.32}.prompt span{display:block;margin-bottom:12px;color:var(--muted);font-weight:760;line-height:1.55}.choices{display:grid;gap:10px}.choice{min-height:62px;padding:13px 14px;text-align:left}.choice strong,.choice small{display:block}.choice small{margin-top:4px;color:var(--muted);font-size:12px}.correct{border-color:var(--good);background:#e9f5ee}.wrong{border-color:var(--bad);background:#fff0e8}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:20px;background:var(--paper);color:var(--muted);font-weight:740;line-height:1.62}.feedback strong{color:var(--ink)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.nav{position:fixed;left:50%;bottom:0;z-index:30;width:min(100%,520px);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid rgba(126,111,88,.26);background:rgba(255,253,247,.95);backdrop-filter:blur(12px);transform:translateX(-50%)}.nav button{min-height:48px;border:none;background:transparent;color:var(--muted);border-radius:14px;font-size:12px}.nav button.active{background:var(--soft);color:var(--accent)}@media(max-width:430px){.shell{padding-left:12px;padding-right:12px}h1{font-size:29px}.grid,.words,.tools{grid-template-columns:1fr}.scene{grid-template-columns:50px 1fr auto;padding:12px}.art{width:50px;height:50px}}

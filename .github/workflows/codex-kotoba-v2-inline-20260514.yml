          cat > app.js <<'JS'
          const VERSION="Kotoba Trip V2";const STORE_KEY="kotobaTripProgress_v2";const LIMIT=120;const $=s=>document.querySelector(s);const state={view:"home",scenes:[],vocab:[],activeSceneId:null,activeVocabCategory:"全部",deck:[],index:0,current:null,currentMode:"scene",answered:false,sound:true,voice:null,progress:loadProgress()};init();async function init(){bind();loadVoices();await loadDb();renderAll()}async function loadDb(){try{const[a,b]=await Promise.all([fetch("./data/kotoba/scene_questions.json",{cache:"no-store"}),fetch("./data/kotoba/vocabulary_cards.json",{cache:"no-store"})]);state.scenes=await a.json();state.vocab=await b.json()}catch(e){console.error(e);state.scenes=[];state.vocab=[]}state.activeSceneId=state.scenes[0]?.id||null}function bind(){document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>b.dataset.view==="practice"?startScene(state.activeSceneId):show(b.dataset.view));$("#soundToggle").onclick=()=>{state.sound=!state.sound;$("#soundToggle").classList.toggle("secondary",!state.sound)};$("#startToday").onclick=()=>startScene(today()?.id);$("#leavePractice").onclick=()=>show(state.currentMode==="vocab"?"vocab":"home");$("#playPrompt").onclick=()=>speak(state.current?.answer||state.current?.jp);$("#notSure").onclick=()=>grade(null);$("#nextCard").onclick=next;$("#reviewWeakness").onclick=reviewWeakness;$("#vocabCategory").onchange=e=>{state.activeVocabCategory=e.target.value;renderVocab()};$("#startVocab").onclick=startVocab;if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=loadVoices}function renderAll(){renderHome();renderVocab();renderNotebook();renderMe();nav()}function renderHome(){const t=today();$("#todayTitle").textContent=t?.title||"資料庫載入中";$("#todayCopy").textContent=t?`${t.copy} 今天從 ${t.cards.length} 題挑不重複題。`:"請稍等。";$("#freshCount").textContent=`${fresh(allCards()).length} 個新練習`;$("#sceneList").innerHTML=state.scenes.map(s=>{const done=s.cards.filter(c=>state.progress.seen[c.id]).length;return `<button class="scene" data-scene="${s.id}"><span class="art">${s.icon}</span><span><strong>${h(s.title)}</strong><small>${h(s.copy)}</small></span><span class="count">${done}/${s.cards.length}</span></button>`}).join("")||`<div class="note"><strong>資料庫尚未載入</strong>請重新整理。</div>`;document.querySelectorAll("[data-scene]").forEach(b=>b.onclick=()=>startScene(b.dataset.scene));$("#memoryBoard").innerHTML=state.scenes.map(s=>`<div class="chip"><strong>${h(s.title)}</strong><span>${h(s.memory)}</span></div>`).join("")}function renderVocab(){const cats=["全部",...new Set(state.vocab.map(x=>x.category))];$("#vocabCategory").innerHTML=cats.map(c=>`<option value="${h(c)}"${c===state.activeVocabCategory?" selected":""}>${h(c)}</option>`).join("");const pool=filteredVocab();$("#vocabCount").textContent=`${pool.length} 張`;$("#vocabShelf").innerHTML=pick(pool,18,"vocab").map(w=>`<button class="word" data-word="${w.id}"><b>${h(w.pos)}</b><strong>${h(w.jp)}</strong><small>${h(w.kana)} · ${h(w.zh)}</small></button>`).join("");document.querySelectorAll("[data-word]").forEach(b=>b.onclick=()=>{const w=state.vocab.find(x=>x.id===b.dataset.word);if(w)speak(w.jp)})}function startScene(id){const s=state.scenes.find(x=>x.id===id)||state.scenes[0];if(!s)return;state.activeSceneId=s.id;state.currentMode="scene";state.deck=pick(s.cards,8,"scene");state.index=0;show("practice");renderPractice()}function startVocab(){state.currentMode="vocab";state.deck=pick(filteredVocab(),10,"vocab").map(vocabQ);state.index=0;show("practice");renderPractice("單詞快閃")}function reviewWeakness(){const fam=Object.keys(state.progress.weakness);if(!fam.length)return startScene(state.activeSceneId);state.currentMode="scene";state.deck=pick(allCards().filter(x=>fam.includes(x.family)),8,"scene");state.index=0;show("practice");renderPractice("換句複習")}function renderPractice(title=state.currentMode==="vocab"?"單詞快閃":"小劇情練習"){const c=state.deck[state.index];if(!c)return;state.current=c;state.answered=false;const s=state.scenes.find(x=>x.cards.some(y=>y.id===c.id));$("#practiceScene").textContent=state.currentMode==="vocab"?c.category:s?.title||"Review";$("#practiceTitle").textContent=title;$("#practiceProgress").textContent=`${state.index+1}/${state.deck.length}`;$("#promptMode").textContent=label(c.type);$("#promptText").textContent=c.prompt;$("#promptHint").textContent=c.audio?"先聽，再選。答錯會換同概念再練。":"選最自然的答案。出過的題目會盡量避開。";$("#feedback").classList.add("hidden");$("#feedback").innerHTML="";$("#choiceArea").innerHTML=c.choices.map(x=>`<button class="choice" data-choice="${h(x.text)}"><strong>${h(x.text)}</strong><small>${h(x.zh||x.sense||"")}</small></button>`).join("");document.querySelectorAll("[data-choice]").forEach(b=>b.onclick=()=>grade(b.dataset.choice));if(c.audio)speak(c.answer||c.jp)}function grade(choice){if(!state.current||state.answered)return;state.answered=true;const ok=choice===state.current.answer;seen(state.current.id,state.currentMode);document.querySelectorAll(".choice").forEach(b=>{if(b.dataset.choice===state.current.answer)b.classList.add("correct");if(choice&&b.dataset.choice===choice&&!ok)b.classList.add("wrong")});if(ok){state.progress.correct++;const w=state.progress.weakness[state.current.family];if(w&&++w.streak>=2)delete state.progress.weakness[state.current.family]}else if(state.currentMode==="scene")state.progress.weakness[state.current.family]={family:state.current.family,lastPrompt:state.current.prompt,answer:state.current.answer,explanation:state.current.explanation,streak:0};state.progress.total++;state.progress.lastDate=todayKey();save();const selected=state.current.choices.find(x=>x.text===choice);$("#feedback").classList.remove("hidden");$("#feedback").innerHTML=`<strong>${ok?"答對":"這次先記住語感"}</strong><br>正解：${h(state.current.answer)}<br>意思：${h(state.current.answerZh||state.current.answer_zh||"")}<br>${choice&&!ok?`你選：${h(choice)} ${selected?.zh?`，${h(selected.zh)}`:""}<br>`:""}${h(state.current.explanation)}<br>${ok?"很好，下一題會避開重複。":"系統會用同概念換一句再考。"}`;renderNotebook();renderMe()}function next(){if(state.index>=state.deck.length-1){show(state.currentMode==="vocab"?"vocab":"home");renderAll();return}state.index++;renderPractice()}function vocabQ(w){const ds=pick(state.vocab.filter(x=>x.category===w.category&&x.id!==w.id),3,"vocab").map(x=>({text:x.zh,zh:x.jp,sense:x.pos,correct:false}));return{id:w.id,type:"vocab",prompt:w.mode==="聽發音選中文"?"聽這個單字，選中文。":w.jp,answer:w.zh,answerZh:w.jp,choices:shuffle([{text:w.zh,zh:w.jp,sense:w.pos,correct:true},...ds]).slice(0,4),explanation:`${w.jp}（${w.kana}）是「${w.zh}」，詞性是${w.pos}。例句：${w.example_jp}`,family:`vocab_${w.category}`,audio:true,category:w.category,jp:w.jp}}function filteredVocab(){return state.activeVocabCategory==="全部"?state.vocab:state.vocab.filter(x=>x.category===state.activeVocabCategory)}function pick(pool,n,mode="scene"){const key=mode==="vocab"?"vocabHistory":"history",r=new Set((state.progress[key]||[]).slice(0,LIMIT)),fresh=pool.filter(x=>!r.has(x.id)),used=pool.filter(x=>r.has(x.id));return[...shuffle(fresh),...shuffle(used)].slice(0,n)}function allCards(){return state.scenes.flatMap(s=>s.cards)}function fresh(pool){const r=new Set(state.progress.history.slice(0,LIMIT));return pool.filter(x=>!r.has(x.id))}function seen(id,mode){state.progress.seen[id]=true;const key=mode==="vocab"?"vocabHistory":"history";state.progress[key]=[id,...(state.progress[key]||[]).filter(x=>x!==id)].slice(0,LIMIT)}function renderNotebook(){const items=Object.values(state.progress.weakness);$("#weaknessList").innerHTML=items.length?items.map(x=>`<div class="note"><strong>${h(x.family)}</strong>上次卡住：${h(x.lastPrompt)}<br>正解：${h(x.answer)}<br>${h(x.explanation)}</div>`).join(""):`<div class="note"><strong>目前沒有錯題</strong>答錯後，這裡會留下語感弱點。</div>`}function renderMe(){const total=state.progress.total,rate=total?Math.round(state.progress.correct/total*100):0;$("#streakText").textContent=`${state.progress.lastDate===todayKey()?1:0} 天`;$("#profileSummary").textContent=total?`做過 ${total} 題，答對率 ${rate}%。`:"今天還沒開始。";$("#statsList").innerHTML=`<div class="note"><strong>場景題庫</strong>${allCards().length} 題，4 個既有場景各 500 題。</div><div class="note"><strong>單詞卡</strong>${state.vocab.length} 張，依詞性與生活分類練習。</div><div class="note"><strong>自然語音</strong>${voiceName()}。iPhone 會優先使用系統裡最自然的日文聲線。</div><div class="note"><strong>版本</strong>${VERSION}，讀取新版 data/kotoba 資料庫。</div>`}function show(v){state.view=v;document.querySelectorAll(".view").forEach(s=>s.classList.add("hidden"));$(`#${v}View`).classList.remove("hidden");nav()}function nav(){document.querySelectorAll("[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view))}function today(){return state.scenes.length?state.scenes[new Date().getDate()%state.scenes.length]:null}function label(t){return{direction:"方向",time:"時間",vehicle:"交通",request:"請求",want:"想做",polite:"禮貌",state:"狀態",prepared:"準備",see:"感官",price:"購物","i-adjective":"い形容詞","na-adjective":"な形容詞",vocab:"單詞"}[t]||"語感"}function loadVoices(){if(!("speechSynthesis"in window))return;const vs=speechSynthesis.getVoices().filter(v=>v.lang?.toLowerCase().startsWith("ja"));state.voice=vs.find(v=>/premium|enhanced|kyoko|otoya|nanami|siri|google/i.test(v.name))||vs[0]||null;renderMe()}function voiceName(){return state.voice?state.voice.name:"使用裝置預設日文語音"}function speak(text){if(!state.sound||!text||!("speechSynthesis"in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="ja-JP";u.rate=.82;u.pitch=1.02;if(state.voice)u.voice=state.voice;speechSynthesis.speak(u)}function loadProgress(){const f={total:0,correct:0,history:[],vocabHistory:[],seen:{},weakness:{},lastDate:null};try{const s=JSON.parse(localStorage.getItem(STORE_KEY));return s?{...f,...s,history:s.history||[],vocabHistory:s.vocabHistory||[],seen:s.seen||{},weakness:s.weakness||{}}:f}catch{return f}}function save(){localStorage.setItem(STORE_KEY,JSON.stringify(state.progress))}function todayKey(){return new Date().toISOString().slice(0,10)}function shuffle(a){return[...a].map(value=>({value,sort:Math.random()})).sort((a,b)=>a.sort-b.sort).map(x=>x.value)}function h(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}

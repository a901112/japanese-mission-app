          node scripts/build-kotoba-data.mjs
      - name: Validate V2
        run: |
          node --check app.js
          node - <<'NODE'
          const fs=require('fs'),s=JSON.parse(fs.readFileSync('data/kotoba/scene_questions.json','utf8')),v=JSON.parse(fs.readFileSync('data/kotoba/vocabulary_cards.json','utf8')),app=fs.readFileSync('app.js','utf8'),html=fs.readFileSync('index.html','utf8');
          const cards=s.flatMap(x=>x.cards);
          if(!app.includes('Kotoba Trip V2')) throw Error('missing V2');
          if(!html.includes('vocabView')) throw Error('missing vocab view');
          if(s.length!==4||!s.every(x=>x.cards.length===500)||cards.length!==2000) throw Error('scene count failed');
          if(v.length!==3000) throw Error('vocab count failed');
          if(!cards.every(q=>q.choices.filter(c=>c.correct).length===1)) throw Error('unique answer failed');
          if(app.includes('published_questions')||html.includes('JLPT')) throw Error('old app returned');
          NODE
      - name: Commit V2
        run: |
          git config user.name 'codex-bot'
          git config user.email 'codex-bot@users.noreply.github.com'
          git add index.html styles.css app.js data/kotoba scripts/build-kotoba-data.mjs
          git commit -m 'feat: publish Kotoba Trip V2 database and vocabulary cards'
          git push origin HEAD:main

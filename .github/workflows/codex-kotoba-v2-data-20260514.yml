name: Codex Kotoba Trip V2 data update

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/codex-kotoba-v2-data-20260514.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download updated site files
        run: |
          set -euxo pipefail
          curl -L --retry 3 -A 'Mozilla/5.0' 'https://tmpfiles.org/dl/wmwVw9m7e2Lj/kotoba-trip-v2-data.zip' -o /tmp/kotoba-trip-v2-data.zip
          ls -lh /tmp/kotoba-trip-v2-data.zip
          file /tmp/kotoba-trip-v2-data.zip
          python3 - <<'PY'
          import zipfile
          z = zipfile.ZipFile('/tmp/kotoba-trip-v2-data.zip')
          z.extractall('/tmp/kotoba-trip-v2')
          print('\n'.join(z.namelist()))
          PY
          cp /tmp/kotoba-trip-v2/index.html ./index.html
          cp /tmp/kotoba-trip-v2/app.js ./app.js
          cp /tmp/kotoba-trip-v2/styles.css ./styles.css
          mkdir -p ./data/kotoba ./scripts
          cp /tmp/kotoba-trip-v2/kotoba/scene_questions.json ./data/kotoba/scene_questions.json
          cp /tmp/kotoba-trip-v2/kotoba/vocabulary_cards.json ./data/kotoba/vocabulary_cards.json
          cp /tmp/kotoba-trip-v2/build-kotoba-data.mjs ./scripts/build-kotoba-data.mjs
      - name: Validate Kotoba Trip V2 data
        run: |
          set -euxo pipefail
          node --check app.js
          node - <<'NODE'
          const fs = require('fs');
          const scenes = JSON.parse(fs.readFileSync('data/kotoba/scene_questions.json', 'utf8'));
          const vocab = JSON.parse(fs.readFileSync('data/kotoba/vocabulary_cards.json', 'utf8'));
          const app = fs.readFileSync('app.js', 'utf8');
          const html = fs.readFileSync('index.html', 'utf8');
          const cards = scenes.flatMap((scene) => scene.cards);
          if (!app.includes('Kotoba Trip V2')) throw new Error('missing version');
          if (!app.includes('vocabulary_cards.json')) throw new Error('missing vocab loader');
          if (!html.includes('vocabView')) throw new Error('missing vocab page');
          if (scenes.length !== 4) throw new Error(`expected 4 scenes, got ${scenes.length}`);
          if (!scenes.every((scene) => scene.cards.length === 500)) throw new Error('each scene must have 500 cards');
          if (cards.length !== 2000) throw new Error(`expected 2000 scene cards, got ${cards.length}`);
          if (vocab.length !== 3000) throw new Error(`expected 3000 vocab cards, got ${vocab.length}`);
          if (!cards.every((card) => card.choices.filter((choice) => choice.correct).length === 1)) throw new Error('question must have unique correct choice');
          if (app.includes('published_questions')) throw new Error('old published question loader returned');
          if (html.includes('JLPT')) throw new Error('old JLPT label returned');
          console.log('Kotoba Trip V2 validation passed');
          NODE
      - name: Commit changes
        run: |
          set -euxo pipefail
          git config user.name 'codex-bot'
          git config user.email 'codex-bot@users.noreply.github.com'
          git add index.html app.js styles.css data/kotoba scripts/build-kotoba-data.mjs
          git commit -m 'feat: add Kotoba Trip V2 database and vocabulary cards'
          git push origin HEAD:main
